<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo circular azul -->
  <circle cx="16" cy="16" r="16" fill="#2563eb"/>
  <!-- Esfera blanca -->
  <circle cx="16" cy="16" r="12.5" fill="white"/>
  <!-- Marcas de hora (12, 3, 6, 9) -->
  <rect x="15.2" y="4.5" width="1.6" height="3" rx="0.8" fill="#2563eb"/>
  <rect x="24.5" y="15.2" width="3" height="1.6" rx="0.8" fill="#2563eb"/>
  <rect x="15.2" y="24.5" width="1.6" height="3" rx="0.8" fill="#2563eb"/>
  <rect x="4.5" y="15.2" width="3" height="1.6" rx="0.8" fill="#2563eb"/>
  <!-- Manecilla de hora (apunta ~10) -->
  <line x1="16" y1="16" x2="10.5" y2="10" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Manecilla de minutos (apunta ~2) -->
  <line x1="16" y1="16" x2="22" y2="8.5" stroke="#1e293b" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Punto central -->
  <circle cx="16" cy="16" r="1.8" fill="#2563eb"/>
</svg>
